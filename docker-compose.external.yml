# ── Keylone — Self-hosted (external PostgreSQL) ───────────────────────────────
#
# Use this file if you already have a PostgreSQL instance running.
#
#   cp .env.external.example .env
#   docker compose -f docker-compose.external.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  keylone:
    image: ghcr.io/yukh975/keylone:latest
    container_name: keylone
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - RUST_LOG=keylone_server=info
    # Required to reach host PostgreSQL from inside the container
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
